<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>找歌和弦（30 秒开唱）— 线框原型</title>
    <style>
      :root {
        --bg: #f4f4f5;
        --card: #fff;
        --ink: #111;
        --muted: rgba(17, 17, 17, 0.68);
        --bd: #d8d8d8;
        --ok-bg: #edf8ef;
        --ok-ink: #146c2e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 16px 14px 30px;
      }
      .muted-link {
        font-size: 13px;
        color: var(--muted);
      }
      .head h1 {
        margin: 8px 0 4px;
        font-size: 1.24rem;
      }
      .head p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .tip {
        margin-top: 12px;
        border: 1px solid #dfcd8a;
        background: #fff8de;
        color: #6b5200;
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 12px;
      }
      .card {
        margin-top: 12px;
        border: 1px solid var(--bd);
        border-radius: 14px;
        background: var(--card);
        padding: 13px;
      }
      .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border: 1px solid var(--bd);
        border-radius: 10px;
        padding: 11px 10px;
        font-size: 15px;
        background: #fff;
      }
      button {
        width: 100%;
        border: 1px solid var(--ink);
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 15px;
        font-weight: 760;
        cursor: pointer;
      }
      .btn-main {
        margin-top: 10px;
        color: #fff;
        background: var(--ink);
      }
      .btn-sub {
        margin-top: 8px;
        color: var(--ink);
        background: #fff;
      }
      .status {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .result {
        margin-top: 10px;
        border: 1px dashed var(--bd);
        border-radius: 10px;
        padding: 10px;
        background: #fcfcfc;
      }
      .result h3 {
        margin: 0 0 6px;
        font-size: 16px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .chip {
        border: 1px solid var(--bd);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: #333;
      }
      .chip.em {
        color: var(--ok-ink);
        border-color: #b8dfc0;
        background: var(--ok-bg);
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .mini {
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .mini b {
        display: block;
        margin-bottom: 4px;
      }
      .progression {
        margin-top: 8px;
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .progression .line {
        margin-top: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      .actions {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .filters {
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }
      .filter-btn {
        margin-top: 0;
        width: auto;
        padding: 6px 10px;
        font-size: 13px;
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
      }
      .filter-btn.on {
        background: var(--ink);
        color: #fff;
      }
      .chart {
        margin-top: 8px;
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 8px;
        background: #fff;
      }
      .chart b {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .chart pre {
        margin: 0;
        white-space: pre-wrap;
        font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      .chart-tip {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .muted {
        font-size: 12px;
        color: var(--muted);
        margin-top: 7px;
      }
      .hidden {
        display: none !important;
      }
      .mini-status {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .mini-select {
        margin-top: 6px;
        width: 100%;
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 7px 9px;
        font-size: 13px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a class="muted-link" href="./README.md">← 需求目录（README）</a>
      <header class="head">
        <h1>找歌和弦（30 秒开唱）</h1>
        <p>线框原型：查库优先，查不到自动 AI 补全；默认只展示 1 个推荐歌谱（v1）。</p>
      </header>
      <div class="tip">MVP 目标：用户输入歌名后，尽量在 30 秒内拿到可唱可弹版本并直接开唱。</div>

      <section class="card">
        <div class="label">输入歌曲（歌名 / 歌名+歌手）</div>
        <input id="songQuery" type="text" value="夜空中最亮的星 逃跑计划" placeholder="例如：晴天 周杰伦" />
        <button id="searchBtn" class="btn-main" type="button">搜索可弹和弦</button>
        <div id="searchStatus" class="status">等待搜索</div>
      </section>

      <section id="resultWrap" class="card hidden" aria-live="polite">
        <div class="label">推荐歌谱（默认 1 个）</div>
        <div class="filters">
          <button type="button" class="filter-btn on" data-level="beginner">新手</button>
          <button type="button" class="filter-btn" data-level="intermediate">中级</button>
          <button type="button" class="filter-btn" data-level="advanced">进阶</button>
        </div>
        <div id="results"></div>
      </section>
    </main>

          difficulty: "beginner",
          keyOriginal: "未知",
          keyRecommended: "C",
          transposeOptions: "-2 -1 0 +1 +2",

      function normalizeIndex(index) {
        return ((index % 12) + 12) % 12;
      }

      function transposeKeyName(key, semitones) {
        const i = NOTE_TO_INDEX[key];
        if (i === undefined) return key;
        return KEY_ORDER[normalizeIndex(i + semitones)];
      }

      function transposeChordSymbol(symbol, semitones) {
        const m = String(symbol || "").trim().match(/^([A-G](?:b|#)?)([^/]*)((?:\/)([A-G](?:b|#)?))?$/);
        if (!m) return symbol;
        const root = m[1];
        const quality = m[2] || "";
        const bass = m[4] || "";
        const rootT = transposeKeyName(root, semitones);
        const bassT = bass ? transposeKeyName(bass, semitones) : "";
        return `${rootT}${quality}${bassT ? `/${bassT}` : ""}`;
      }

      function transposeChordLine(line, semitones) {
        return String(line || "")
          .split(/\s*-\s*/)
          .map((c) => transposeChordSymbol(c, semitones))
          .join(" - ");
      }

      function transposeFullChart(chart, semitones) {
        return String(chart || "").replace(/\[([A-G](?:b|#)?[^\]\s]*)\]/g, (_, chord) => {
          return `[${transposeChordSymbol(chord, semitones)}]`;
        });
      }

      function semitoneDistance(fromKey, toKey) {
        const from = NOTE_TO_INDEX[fromKey];
        const to = NOTE_TO_INDEX[toKey];
        if (from === undefined || to === undefined) return 0;
        return to - from;
      }

      function renderCard(item) {
        const card = document.createElement("article");
        card.className = "result";
        const keyOptionsHtml = KEY_ORDER
          .map((k) => `<option value="${k}">${k}</option>`)
          .join("");
        card.innerHTML = `
          <h3>${item.title}</h3>
          <div class="chips">
            <span class="chip em">${item.difficulty === "beginner" ? "新手优先" : "中级可用"}</span>
            <span class="chip">来源：${item.sourceType}</span>
            <span class="chip">推荐调：${item.keyRecommended}</span>
            <span class="chip">当前版本：${versionNo}</span>
          </div>
          <div class="grid2">
            <div class="mini"><b>调号</b>原调：${item.keyOriginal}</div>
            <div class="mini">
              <b>选调（12 调）</b>
              <select class="mini-select" data-role="target-key-select">${keyOptionsHtml}</select>
            </div>
          </div>
          <div class="progression">
            <b>主歌和弦</b>
            <div class="line" data-role="verse-line">${item.verse}</div>
          </div>
          <div class="progression">
            <b>副歌和弦</b>
            <div class="line" data-role="chorus-line">${item.chorus}</div>
          </div>
          <div class="chart">
            <b>完整歌谱（歌词 + 和弦对照）</b>
            <pre data-role="full-chart">${item.fullChart}</pre>
            <div class="chart-tip">原型说明：这里展示完整结构长度，歌词内容在正式版本由合法数据源返回。</div>
          </div>
          <div class="muted">推荐理由：${item.why}</div>
          <div class="actions">
            <button type="button" class="btn-main" data-action="ai-verify">AI核对并更新</button>
            <button type="button" class="btn-sub" data-action="view-v2">查看上一版（${previousVersionNo}）</button>
          </div>
          <div class="mini-status">说明：点击 AI核对后，系统会先把当前 ${versionNo} 备份到 ${previousVersionNo}，再用新结果覆盖当前版本。</div>
        `;
        card.dataset.baseKey = item.keyRecommended;
        card.dataset.baseVerse = item.verse;
        card.dataset.baseChorus = item.chorus;
        card.dataset.baseFullChart = item.fullChart;
        card.dataset.originalKey = item.keyOriginal;
        return card;
      }

      function getCurrentItem() {
        const bank = currentSource === "fallback" ? MOCK_FALLBACK : MOCK_HIT;
        return bank[currentLevel] || bank.beginner;
      }

      function renderResults() {
        resultsEl.innerHTML = "";
        resultsEl.appendChild(renderCard(getCurrentItem()));
        resultWrapEl.classList.remove("hidden");
        bindCardActions();
      }

      function bindCardActions() {
        const cardEl = resultsEl.querySelector(".result");
        if (cardEl) {
          bindTransposeActions(cardEl);

        const verifyBtn = resultsEl.querySelector('[data-action="ai-verify"]');
        const viewV2Btn = resultsEl.querySelector('[data-action="view-v2"]');
        if (verifyBtn) {
          verifyBtn.addEventListener("click", simulateAiVerify);
        }
        if (viewV2Btn) {
          viewV2Btn.addEventListener("click", () => {
            alert("原型说明：这里会展示上一版 v2 的歌谱内容（只保留 1 份历史版本）。");
          });
        }
      }

      function bindTransposeActions(cardEl) {
        const selectEl = cardEl.querySelector('[data-role="target-key-select"]');
        const verseEl = cardEl.querySelector('[data-role="verse-line"]');
        const chorusEl = cardEl.querySelector('[data-role="chorus-line"]');
        const fullChartEl = cardEl.querySelector('[data-role="full-chart"]');
        const baseKey = cardEl.dataset.baseKey || "C";
        const originalKey = cardEl.dataset.originalKey || baseKey;
        const baseVerse = cardEl.dataset.baseVerse || "";
        const baseChorus = cardEl.dataset.baseChorus || "";
        const baseFullChart = cardEl.dataset.baseFullChart || "";
        const initialKey = NOTE_TO_INDEX[originalKey] === undefined ? baseKey : originalKey;

        function applyTargetKey(targetKey) {
          const offset = semitoneDistance(baseKey, targetKey);
          if (verseEl) verseEl.textContent = transposeChordLine(baseVerse, offset);
          if (chorusEl) chorusEl.textContent = transposeChordLine(baseChorus, offset);
          if (fullChartEl) fullChartEl.textContent = transposeFullChart(baseFullChart, offset);
        }

        if (selectEl) {
          selectEl.value = initialKey;
          selectEl.addEventListener("change", () => applyTargetKey(selectEl.value));
        }
        applyTargetKey(initialKey);
      }

      function simulateAiVerify() {
        statusEl.textContent = "AI核对中：正在重生成歌谱并更新当前版本...";
        setTimeout(() => {
          statusEl.textContent = "AI核对完成：已备份旧版到 v2，并将新结果覆盖为当前 v1";
          currentSource = "fallback";
          renderResults();
        }, 900);
      }

      function simulateSearch() {
        const q = document.getElementById("songQuery").value.trim();
        if (!q) {
          alert("请先输入歌名。");
          return;
        }

        statusEl.textContent = "正在搜索：先查曲库，再按需 AI 补全...";
        resultWrapEl.classList.add("hidden");
        resultsEl.innerHTML = "";

        const startedAt = Date.now();
        setTimeout(() => {
          const useFallback = q.includes("测试找不到");
          const elapsed = Date.now() - startedAt;
          if (useFallback) {
            currentSource = "fallback";
            statusEl.textContent = `未命中曲库，已触发 AI 补全（${elapsed}ms）`;
            renderResults();
            return;
          }
          currentSource = "hit";
          statusEl.textContent = `搜索完成：${q}（${elapsed}ms）`;
          renderResults();
        }, 900);
      }

      searchBtn.addEventListener("click", simulateSearch);
      filterBtnEls.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtnEls.forEach((x) => x.classList.remove("on"));
          btn.classList.add("on");
          currentLevel = btn.dataset.level;
          if (!resultWrapEl.classList.contains("hidden")) {
            renderResults();
          }
        });
      });
    </script>
  </body>
</html>
