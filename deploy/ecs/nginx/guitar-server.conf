# 站点：由 wanghan rsync 更新（见 deploy/ecs/README.md）
#
# 证书：acme.sh 安装到 deploy/ecs/nginx/ssl/（勿提交 *.pem）。
# HTTP-01 校验目录：/home/wanghan/guitar-ai-coach/acme-webroot（属主 wanghan，避免 site 下 root 目录无法写入）。
#
# 访问/错误日志写在项目目录下，便于 wanghan 直接读（一般无需 sudo tail）。
# 首次部署后执行其一（推荐 a；无 sudo 时用 b）：
# a) sudo mkdir -p .../logs/nginx && sudo chown wanghan:nginx .../logs/nginx && sudo chmod 2775 .../logs/nginx
#    && sudo usermod -aG nginx wanghan（重新登录后生效）
# b) mkdir -p .../logs/nginx && chmod 777 .../logs/nginx   # 仅个人小机可临时用
# 若 nginx 报「Permission denied」写日志，给家目录加仅可进入：sudo chmod 711 /home/wanghan
# 最后：sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

map $http_upgrade $proxy_upgrade {
    default $http_upgrade;
    ""      "";
}

# 本文件由 http{} 内 include；log_format 仅允许出现在 http 上下文中。
# request_time：Nginx 记录整段请求墙钟（含客户端上传 + 上游响应）。
# upstream_response_time：上游（uvicorn）处理时间；反代静态文件时常为 "-"。
# req_len：$request_length，请求行+头+体（Nginx 实际收到的字节，最接近「上传+头」）。
# content_length：$content_length，客户端声明的 Content-Length（无则 "-"；chunked 常为 "-"）。
log_format guitar_timing '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'request_time=$request_time upstream_time=$upstream_response_time upstream_status=$upstream_status '
    'req_len=$request_length content_length=$content_length';

server {
    listen       80;
    listen       [::]:80;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    access_log /home/wanghan/guitar-ai-coach/logs/nginx/access.log guitar_timing;
    error_log  /home/wanghan/guitar-ai-coach/logs/nginx/error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        alias /home/wanghan/guitar-ai-coach/acme-webroot/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    ssl_certificate     /home/wanghan/guitar-ai-coach/deploy/ecs/nginx/ssl/wanghanai.xyz.fullchain.pem;
    ssl_certificate_key /home/wanghan/guitar-ai-coach/deploy/ecs/nginx/ssl/wanghanai.xyz.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /home/wanghan/guitar-ai-coach/logs/nginx/access.log guitar_timing;
    error_log  /home/wanghan/guitar-ai-coach/logs/nginx/error.log warn;

    root         /home/wanghan/guitar-ai-coach/site;

    include /etc/nginx/default.d/*.conf;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PaddleOCR（本机 uvicorn 127.0.0.1:18081）。外网路径前缀 /paddleocr/ 去掉后转发到 FastAPI 的 /health、/ocr
    location /paddleocr/ {
        client_max_body_size 30m;
        proxy_pass http://127.0.0.1:18081/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chord ONNX service（本机 uvicorn 127.0.0.1:8000）
    # 通过 https://wanghanai.xyz/api/chord-onnx/ 访问
    location /api/chord-onnx/ {
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
