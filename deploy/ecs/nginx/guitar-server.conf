# 站点：由 wanghan rsync 更新（见 deploy/ecs/README.md）
#
# HTTPS：证书路径为 Certbot 默认位置。须先在 ECS 上按 README「HTTPS（Let's Encrypt）」
# 执行 certbot 取得 /etc/letsencrypt/live/wanghanai.xyz/ 后再 reload，否则 nginx -t 会失败。

# ---- 80：ACME 续期 + 其余跳转到 HTTPS ----
server {
    listen       80;
    listen       [::]:80;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    location ^~ /.well-known/acme-challenge/ {
        root /home/wanghan/guitar-ai-coach/site;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443：站点与 API ----
server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    ssl_certificate     /etc/letsencrypt/live/wanghanai.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanghanai.xyz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root         /home/wanghan/guitar-ai-coach/site;

    include /etc/nginx/default.d/*.conf;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
