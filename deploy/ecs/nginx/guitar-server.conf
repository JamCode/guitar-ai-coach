# 站点：由 wanghan rsync 更新（见 deploy/ecs/README.md）
#
# 证书：acme.sh 安装到 deploy/ecs/nginx/ssl/（勿提交 *.pem）。
# HTTP-01 校验目录：/home/wanghan/guitar-ai-coach/acme-webroot（属主 wanghan，避免 site 下 root 目录无法写入）。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

map $http_upgrade $proxy_upgrade {
    default $http_upgrade;
    ""      "";
}

server {
    listen       80;
    listen       [::]:80;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        alias /home/wanghan/guitar-ai-coach/acme-webroot/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  wanghanai.xyz www.wanghanai.xyz;

    ssl_certificate     /home/wanghan/guitar-ai-coach/deploy/ecs/nginx/ssl/wanghanai.xyz.fullchain.pem;
    ssl_certificate_key /home/wanghan/guitar-ai-coach/deploy/ecs/nginx/ssl/wanghanai.xyz.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root         /home/wanghan/guitar-ai-coach/site;

    include /etc/nginx/default.d/*.conf;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* ^/(sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PaddleOCR（本机 uvicorn 127.0.0.1:18081）。外网路径前缀 /paddleocr/ 去掉后转发到 FastAPI 的 /health、/ocr
    location /paddleocr/ {
        client_max_body_size 30m;
        proxy_pass http://127.0.0.1:18081/;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
