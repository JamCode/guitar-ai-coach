# 复制到 ECS 后按需改名，例如：/etc/nginx/conf.d/guitar-ai-coach.conf
# 1. 将本地 frontend/dist 上传到服务器目录（下方 root），例如：
#    sudo mkdir -p /var/www/guitar-ai-coach
#    sudo rsync -av ./dist/ /var/www/guitar-ai-coach/
# 2. sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS：建议用 certbot 或阿里云证书 + listen 443 ssl。

server {
    listen 80;
    listen [::]:80;
    server_name _;  # 改成你的域名或公网 IP

    root /var/www/guitar-ai-coach;
    index index.html;

    # 静态资源缓存（按需调整）
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA：无匹配文件时回退到 index.html（有 Vue Router history 模式时必需）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
