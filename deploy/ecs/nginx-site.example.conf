# 复制到 ECS 后按需改名，例如：/etc/nginx/conf.d/guitar-ai-coach.conf
# 静态目录建议与主配置一致：wanghan 可写、nginx 可读，例如：
#    /home/wanghan/guitar-ai-coach/site
# 发布：wanghan 直接 rsync dist/ 到该目录（无需 root），见 deploy/ecs/README.md
# 改配置后：sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS：建议用 certbot 或阿里云证书 + listen 443 ssl。

server {
    listen 80;
    listen [::]:80;
    server_name _;  # 改成你的域名或公网 IP

    root /home/wanghan/guitar-ai-coach/site;
    index index.html;

    # 静态资源缓存（按需调整）
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA：无匹配文件时回退到 index.html（有 Vue Router history 模式时必需）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理到本机 Python 服务（index.py）
    location /api/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
