name: SwiftEarHost
options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
packages:
  GuitarAICoach:
    path: ../swift_app
targets:
  SwiftEarHost:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Sources/Resources/Localization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper
        PRODUCT_NAME: SwiftEarHost
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CHORD_ONNX_APP_TOKEN: wang
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Wanle Guitar
        INFOPLIST_KEY_CFBundleName: Wanle Guitar
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Wanle Guitar needs the microphone for tuning and some sound input exercises.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Allow photo library access to import sheet music images or videos.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SWIFT_VERSION: 5.10
    dependencies:
      - package: GuitarAICoach
        product: Core
      - package: GuitarAICoach
        product: Tuner
      - package: GuitarAICoach
        product: Fretboard
      - package: GuitarAICoach
        product: Chords
      - package: GuitarAICoach
        product: ChordChart
      - package: GuitarAICoach
        product: Profile
      - package: GuitarAICoach
        product: Ear
      - package: GuitarAICoach
        product: Practice
      - package: GuitarAICoach
        product: Metronome

  SwiftEarHostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper.tests
    dependencies:
      - target: SwiftEarHost

  SwiftEarHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper.uitests
    dependencies:
      - target: SwiftEarHost

schemes:
  SwiftEarHost:
    build:
      targets:
        SwiftEarHost: all
    test:
      targets:
        - SwiftEarHostTests
        - SwiftEarHostUITests
    run:
      config: Debug
