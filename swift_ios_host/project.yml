name: SwiftEarHost
options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
packages:
  GuitarAICoach:
    path: ../swift_app
  OnnxRuntime:
    path: LocalPackages/onnxruntime-swift-package-manager
targets:
  SwiftEarHost:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Sources/Transcription/Resources
      - Sources/Resources/Localization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper
        PRODUCT_NAME: SwiftEarHost
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Wanle Guitar
        INFOPLIST_KEY_CFBundleName: Wanle Guitar
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Wanle Guitar needs the microphone for tuning and some sound input exercises.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Allow photo library access to import sheet music images or videos.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        SWIFT_VERSION: 5.10
    dependencies:
      - package: GuitarAICoach
        product: Core
      - package: GuitarAICoach
        product: Tuner
      - package: GuitarAICoach
        product: Fretboard
      - package: GuitarAICoach
        product: Chords
      - package: GuitarAICoach
        product: ChordChart
      - package: GuitarAICoach
        product: Profile
      - package: GuitarAICoach
        product: Ear
      - package: GuitarAICoach
        product: Practice
      - package: GuitarAICoach
        product: Metronome
      - package: OnnxRuntime
        product: onnxruntime

  SwiftEarHostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper.tests
    dependencies:
      - target: SwiftEarHost
