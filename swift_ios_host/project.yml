name: SwiftEarHost
options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
packages:
  GuitarAICoach:
    path: ../swift_app
targets:
  SwiftEarHost:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Sources/Resources/Localization
    preBuildScripts:
      - name: Copy Stem Separation Model
        script: |
          MODEL_SRC="${SRCROOT}/../ios_stem_model/stemseparation.mlpackage"
          MODEL_DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/stemseparation.mlpackage"
          if [ ! -d "$MODEL_SRC" ]; then
            echo "error: Missing stem separation model at $MODEL_SRC"
            exit 1
          fi
          rm -rf "$MODEL_DST"
          mkdir -p "$(dirname "$MODEL_DST")"
          cp -R "$MODEL_SRC" "$MODEL_DST"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/stemseparation.mlpackage
      - name: Copy Chord Recognition Model
        script: |
          MODEL_SRC="${IOS_CHORD_MODEL_PATH:-${SRCROOT}/../ios_chord_model/chordrecognition.mlpackage}"
          MODEL_DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/chordrecognition.mlpackage"
          if [ ! -d "$MODEL_SRC" ]; then
            if [ "${ALLOW_MISSING_CHORD_MODEL:-0}" = "1" ]; then
              echo "warning: Missing chord recognition model at $MODEL_SRC; creating simulator-only placeholder. Local chord recognition will be unavailable."
              rm -rf "$MODEL_DST"
              mkdir -p "$MODEL_DST"
              touch "$MODEL_DST/.placeholder"
              exit 0
            fi
            echo "error: Missing chord recognition model at $MODEL_SRC"
            echo "error: Set IOS_CHORD_MODEL_PATH=/absolute/path/to/chordrecognition.mlpackage or create ${SRCROOT}/../ios_chord_model/chordrecognition.mlpackage"
            exit 1
          fi
          rm -rf "$MODEL_DST"
          mkdir -p "$(dirname "$MODEL_DST")"
          cp -R "$MODEL_SRC" "$MODEL_DST"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/chordrecognition.mlpackage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper
        PRODUCT_NAME: SwiftEarHost
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Wanle Guitar
        INFOPLIST_KEY_CFBundleName: Wanle Guitar
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Wanle Guitar needs the microphone for tuning and some sound input exercises.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Allow photo library access to import sheet music images or videos.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SWIFT_VERSION: 5.10
    dependencies:
      - package: GuitarAICoach
        product: Core
      - package: GuitarAICoach
        product: Tuner
      - package: GuitarAICoach
        product: Fretboard
      - package: GuitarAICoach
        product: Chords
      - package: GuitarAICoach
        product: ChordChart
      - package: GuitarAICoach
        product: Profile
      - package: GuitarAICoach
        product: Ear
      - package: GuitarAICoach
        product: Practice
      - package: GuitarAICoach
        product: Metronome

  SwiftEarHostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper.tests
    dependencies:
      - target: SwiftEarHost

  SwiftEarHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wanghan.guitarhelper.uitests
    dependencies:
      - target: SwiftEarHost

schemes:
  SwiftEarHost:
    build:
      targets:
        SwiftEarHost: all
    test:
      targets:
        - SwiftEarHostTests
        - SwiftEarHostUITests
    run:
      config: Debug
