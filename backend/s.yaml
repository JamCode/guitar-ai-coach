edition: 3.0.0
name: guitar-ai-coach-backend
access: default

resources:
  api:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: guitar-ai-coach-api
      description: Guitar AI Coach HTTP API (sample)
      runtime: python3.10
      handler: index.handler
      memorySize: 512
      timeout: 60
      code: ./code
      internetAccess: true
      environmentVariables:
        STAGE: dev
        DASHSCOPE_API_KEY: ${env('DASHSCOPE_API_KEY')}
        DASHSCOPE_MODEL: ${env('DASHSCOPE_MODEL')}
        DASHSCOPE_ENDPOINT: ${env('DASHSCOPE_ENDPOINT')}
        # 阿里云 RDS / PolarDB MySQL（样例 mysql_crud_sample）
        MYSQL_HOST: ${env('MYSQL_HOST')}
        MYSQL_PORT: ${env('MYSQL_PORT')}
        MYSQL_USER: ${env('MYSQL_USER')}
        MYSQL_PASSWORD: ${env('MYSQL_PASSWORD')}
        MYSQL_DATABASE: ${env('MYSQL_DATABASE')}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
