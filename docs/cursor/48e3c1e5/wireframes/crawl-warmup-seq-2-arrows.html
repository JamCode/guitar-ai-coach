<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>方案2 · 指板动线箭头</title>
  <style>
    :root { --bg:#1a1f26; --card:#242b35; --line:#3a4555; --txt:#e8eef4; --muted:#8b9aab; --hi:#3d7a9c; --pill:#2a3d52; --arrow:#7eb8e8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "PingFang SC", sans-serif; background:var(--bg); color:var(--txt); padding:20px; line-height:1.45; }
    h1 { font-size:1rem; font-weight:600; margin:0 0 6px; color:var(--muted); }
    p.sub { margin:0 0 18px; font-size:0.85rem; color:var(--muted); }
    .phone { max-width:320px; margin:0 auto; border:2px solid var(--line); border-radius:28px; padding:14px 12px 18px; background:linear-gradient(180deg,#222a34,#1a1f26); }
    .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; font-size:11px; }
    .nav .t { font-weight:650; }
    .nav .r { display:flex; gap:10px; color:var(--arrow); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 10px 12px; margin-bottom:10px; position:relative; }
    .card h2 { margin:0 0 6px; font-size:11px; color:var(--muted); font-weight:600; }
    .pill { display:inline-block; font-size:9px; padding:2px 8px; border-radius:999px; background:var(--pill); color:#7eb8e8; margin-bottom:6px; }
    .muted { font-size:10px; color:var(--muted); margin-top:6px; }
    .board { position:relative; margin-top:8px; }
    table.grid { border-collapse:collapse; width:100%; font-size:9px; }
    table.grid th, table.grid td { border:1px solid var(--line); text-align:center; padding:6px 2px; height:22px; position:relative; }
    table.grid th { background:#2c3540; color:var(--muted); }
    .hi { background:rgba(61,122,156,0.28); }
    .row-h { color:var(--muted); font-weight:600; width:22px; }
    /* SVG overlay: rough path over ⑥ row L→R then step to ⑤ */
    .overlay { position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; }
    .btn { margin-top:10px; text-align:center; padding:8px; border-radius:10px; border:1px dashed var(--line); font-size:10px; color:var(--muted); }
  </style>
</head>
<body>
  <h1>方案 2：指板 + 动线箭头</h1>
  <p class="sub">高亮区同上；用<strong>虚线路径</strong>叠在格子上表示建议弹奏走向（低保真示意）。</p>
  <div class="phone">
    <div class="nav"><span>‹</span><span class="t">爬格子热身</span><span class="r">保存 ⚙</span></div>
    <div class="card">
      <h2>本组练习</h2>
      <span class="pill">初级</span>
      <div style="font-size:10px;font-weight:600;">⑥–④弦 · 1–4 品</div>
      <div class="muted">半音四品型（上行）</div>
    </div>
    <div class="card">
      <h2>指板示意 + 顺序动线</h2>
      <div class="board">
        <table class="grid" id="g">
          <tr><th></th><th>1</th><th>2</th><th>3</th><th>4</th></tr>
          <tr><td class="row-h">①</td><td></td><td></td><td></td><td></td></tr>
          <tr><td class="row-h">②</td><td></td><td></td><td></td><td></td></tr>
          <tr><td class="row-h">③</td><td></td><td></td><td></td><td></td></tr>
          <tr><td class="row-h">④</td><td class="hi"></td><td class="hi"></td><td class="hi"></td><td class="hi"></td></tr>
          <tr><td class="row-h">⑤</td><td class="hi"></td><td class="hi"></td><td class="hi"></td><td class="hi"></td></tr>
          <tr><td class="row-h">⑥</td><td class="hi"></td><td class="hi"></td><td class="hi"></td><td class="hi"></td></tr>
        </table>
        <svg class="overlay" viewBox="0 0 280 200" preserveAspectRatio="none" aria-hidden="true">
          <path d="M 52 168 L 88 168 L 124 168 L 160 168 L 52 140 L 88 140 L 124 140 L 160 140" fill="none" stroke="#7eb8e8" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="170" y="155" fill="#8b9aab" font-size="9">示意：先⑥弦 1→4，再⑤弦…</text>
        </svg>
      </div>
      <div class="muted">图例：蓝色虚线 = 建议弹奏顺序（实现时可贴合格子中心）。</div>
    </div>
    <div class="btn">下一组</div>
  </div>
</body>
</html>
