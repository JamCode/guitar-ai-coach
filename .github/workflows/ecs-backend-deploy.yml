# 手动 workflow_dispatch / workflow_call，或路径变更时：部署 backend Python、Flyway、以及 Chord ONNX 服务到阿里云 ECS。
#
# 需在仓库 Settings → Secrets and variables → Actions 中配置：
#
# Secrets（必填）
#   ECS_SSH_PRIVATE_KEY     登录 ECS 的 SSH 私钥全文（与 README 中 ECS_KEY 一致，勿提交仓库）
#   FLYWAY_USER             MySQL 用户（建议与 backend.env 中 MYSQL_USER 一致，如 guitar_app）
#   FLYWAY_PASSWORD         MySQL 密码（与 MYSQL_PASSWORD 一致）
#
# Secrets（选填，不配则用下方 Variables / 默认值）
#   FLYWAY_DATABASE         库名，默认 guitar_ai_coach
#
# Variables（Repository variables，非敏感，选填）
#   ECS_HOST                  默认 47.110.78.65（与 deploy/ecs/README.md 一致）
#   ECS_USER                  默认 wanghan
#   ECS_PATH                  默认 /home/wanghan/guitar-ai-coach
#   ECS_MYSQL_HOST            隧道在 ECS 上连到的 MySQL 主机，默认 127.0.0.1（若库在 RDS 可填 RDS 内网域名）
#   ECS_MYSQL_PORT            MySQL 端口，默认 3306
#
# 前置条件（一次性）：
#   - ECS 上已按 deploy/ecs/README.md 配置 systemd、backend.env、MySQL 与 Flyway baseline
#   - SSH 公钥已加入 ECS，且 wanghan 可对 guitar-ai-coach-backend 执行 NOPASSWD restart
#   - Chord ONNX：ECS 上已有 Miniconda 环境 chord-onnx（与 deploy/ecs/chord_onnx/push-and-setup.sh 一致），
#     服务监听 127.0.0.1:8000；rsync 不使用 --delete，避免误删远端 models/*.onnx
#
name: ECS backend deploy (Python + Flyway + Chord ONNX)

permissions:
  contents: read

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ecs-backend-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      flyway: ${{ steps.filter.outputs.flyway }}
      chord_onnx: ${{ steps.filter.outputs.chord_onnx }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'backend/code/**'
            flyway:
              - 'backend/database/flyway/sql/**'
              - 'backend/database/flyway/flyway.conf'
            chord_onnx:
              - 'backend/chord_onnx_server/**'

  deploy:
    name: Deploy to ECS
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.flyway == 'true' ||
      needs.changes.outputs.chord_onnx == 'true'
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter-deploy.outputs.python_changed }}
      flyway_changed: ${{ steps.filter-deploy.outputs.flyway_changed }}
      chord_onnx_changed: ${{ steps.filter-deploy.outputs.chord_onnx_changed }}
    env:
      ECS_HOST: ${{ vars.ECS_HOST }}
      ECS_USER: ${{ vars.ECS_USER }}
      ECS_PATH: ${{ vars.ECS_PATH }}
      ECS_MYSQL_HOST: ${{ vars.ECS_MYSQL_HOST }}
      ECS_MYSQL_PORT: ${{ vars.ECS_MYSQL_PORT }}
      FLYWAY_DATABASE: ${{ secrets.FLYWAY_DATABASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve ECS / DB defaults
        run: |
          echo "ECS_HOST=${ECS_HOST:-47.110.78.65}" >> "$GITHUB_ENV"
          echo "ECS_USER=${ECS_USER:-wanghan}" >> "$GITHUB_ENV"
          echo "ECS_PATH=${ECS_PATH:-/home/wanghan/guitar-ai-coach}" >> "$GITHUB_ENV"
          echo "ECS_MYSQL_HOST=${ECS_MYSQL_HOST:-127.0.0.1}" >> "$GITHUB_ENV"
          echo "ECS_MYSQL_PORT=${ECS_MYSQL_PORT:-3306}" >> "$GITHUB_ENV"
          echo "FLYWAY_DATABASE=${FLYWAY_DATABASE:-guitar_ai_coach}" >> "$GITHUB_ENV"

      - name: Resolve changed scopes for summary
        id: filter-deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
            echo "flyway_changed=true" >> "$GITHUB_OUTPUT"
            echo "chord_onnx_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_changed=${{ needs.changes.outputs.python }}" >> "$GITHUB_OUTPUT"
            echo "flyway_changed=${{ needs.changes.outputs.flyway }}" >> "$GITHUB_OUTPUT"
            echo "chord_onnx_changed=${{ needs.changes.outputs.chord_onnx }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.ECS_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing secret ECS_SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Flyway CLI
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.flyway == 'true'
        run: |
          FLYWAY_VERSION=10.15.0
          curl -fsSL -o /tmp/flyway.tar.gz \
            "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${FLYWAY_VERSION}/flyway-commandline-${FLYWAY_VERSION}.tar.gz"
          tar -xzf /tmp/flyway.tar.gz -C /tmp
          sudo mv "/tmp/flyway-${FLYWAY_VERSION}" /opt/flyway
          sudo ln -sf /opt/flyway/flyway /usr/local/bin/flyway
          flyway -v

      - name: Flyway validate & migrate (SSH tunnel to ECS MySQL)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.flyway == 'true'
        env:
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
        run: |
          if [ -z "${FLYWAY_USER:-}" ] || [ -z "${FLYWAY_PASSWORD:-}" ]; then
            echo "::error::Flyway 路径有变更或手动触发时需要配置 Secrets: FLYWAY_USER, FLYWAY_PASSWORD"
            exit 1
          fi
          # Runner 本机 13306 → 经 ECS 转发到 ECS_MYSQL_HOST:ECS_MYSQL_PORT（不在公网暴露 MySQL）
          ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new -o ExitOnForwardFailure=yes \
            -f -N -L "127.0.0.1:13306:${ECS_MYSQL_HOST}:${ECS_MYSQL_PORT}" \
            "${ECS_USER}@${ECS_HOST}"
          sleep 2
          cleanup() {
            pkill -f "ecs_deploy_key.*127.0.0.1:13306:" || true
          }
          trap cleanup EXIT
          cd backend/database/flyway
          export FLYWAY_URL="jdbc:mysql://127.0.0.1:13306/${FLYWAY_DATABASE}?characterEncoding=utf8&useSSL=false"
          # 库已由 database/ddl 等建过表、但尚无 flyway_schema_history 时，须 baseline 后再跑版本迁移
          export FLYWAY_BASELINE_ON_MIGRATE=true
          flyway info
          # 勿在 migrate 前单独 validate：存在 pending 版本时 Flyway 10+ 会失败；migrate 含 validateOnMigrate
          flyway migrate
          flyway validate

      - name: Rsync Flyway directory to ECS (optional on-server copy)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.flyway == 'true'
        run: |
          rsync -avz -e "ssh -i $HOME/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new" \
            backend/database/flyway/ "${ECS_USER}@${ECS_HOST}:${ECS_PATH}/backend/database/flyway/"

      - name: Rsync Python backend
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.python == 'true'
        run: |
          rsync -avz -e "ssh -i $HOME/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new" \
            backend/code/ "${ECS_USER}@${ECS_HOST}:${ECS_PATH}/backend/code/"

      - name: pip install backend requirements on ECS
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.python == 'true'
        run: |
          ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
            "${ECS_USER}@${ECS_HOST}" \
            "python3 -m pip install --user -r \"${ECS_PATH}/backend/code/requirements.txt\""

      - name: Restart backend service
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.python == 'true'
        run: |
          ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
            "${ECS_USER}@${ECS_HOST}" \
            "sudo systemctl restart guitar-ai-coach-backend && sudo systemctl is-active guitar-ai-coach-backend"

      - name: Smoke check (ECS localhost)
        id: smoke_check
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.python == 'true'
        run: |
          set +e
          code=""
          for i in 1 2 3 4 5 6 7 8; do
            code=$(ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
              "${ECS_USER}@${ECS_HOST}" \
              "curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 http://127.0.0.1:18080/styles" 2>/dev/null)
            code=$(echo -n "$code" | tr -d '\r\n ')
            echo "smoke try $i: HTTP ${code:-empty}"
            [ "$code" = "200" ] && exit 0
            sleep 4
          done
          echo "::error::Backend smoke check failed after retries (expected 200, last=${code:-empty})"
          exit 1

      - name: Rsync chord ONNX server
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.chord_onnx == 'true'
        run: |
          ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
            "${ECS_USER}@${ECS_HOST}" \
            "mkdir -p \"${ECS_PATH}/backend/chord_onnx_server\" \"${ECS_PATH}/logs\""
          rsync -avz -e "ssh -i $HOME/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.pyc' \
            --exclude 'uploads' --exclude 'outputs' \
            backend/chord_onnx_server/ "${ECS_USER}@${ECS_HOST}:${ECS_PATH}/backend/chord_onnx_server/"

      - name: pip install chord ONNX requirements & restart (conda chord-onnx, port 8000)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.chord_onnx == 'true'
        run: |
          ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
            "${ECS_USER}@${ECS_HOST}" \
            "export BASE='${ECS_PATH}' && bash -s" <<'REMOTE'
          set -euo pipefail
          if [[ ! -f "$HOME/miniconda3/etc/profile.d/conda.sh" ]]; then
            echo "::error::ECS: Miniconda not found at ~/miniconda3 (required for chord-onnx env)"
            exit 1
          fi
          # shellcheck source=/dev/null
          source "$HOME/miniconda3/etc/profile.d/conda.sh"
          conda activate chord-onnx
          cd "${BASE}/backend/chord_onnx_server"
          python -m pip install -q -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          chmod +x run.sh 2>/dev/null || true
          CHORD_LOG="${CHORD_ONNX_LOG:-${BASE}/logs/chord_onnx.log}"
          mkdir -p "$(dirname "$CHORD_LOG")"
          echo "stop old listener on 8000"
          if command -v fuser >/dev/null 2>&1; then
            fuser -k 8000/tcp 2>/dev/null || true
          else
            pkill -f "uvicorn app:app --host 0.0.0.0 --port 8000" 2>/dev/null || true
            pkill -f "conda run -n chord-onnx uvicorn" 2>/dev/null || true
          fi
          sleep 2
          echo "start chord onnx: nohup ./run.sh -> $CHORD_LOG"
          nohup ./run.sh >> "$CHORD_LOG" 2>&1 &
          sleep 3
          REMOTE

      - name: Smoke check chord ONNX (ECS localhost :8000)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || needs.changes.outputs.chord_onnx == 'true'
        run: |
          set +e
          code=""
          for i in 1 2 3 4 5 6 7 8; do
            code=$(ssh -i ~/.ssh/ecs_deploy_key -o StrictHostKeyChecking=accept-new \
              "${ECS_USER}@${ECS_HOST}" \
              "curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 http://127.0.0.1:8000/health" 2>/dev/null)
            code=$(echo -n "$code" | tr -d '\r\n ')
            echo "chord-onnx smoke try $i: HTTP ${code:-empty}"
            [ "$code" = "200" ] && exit 0
            sleep 4
          done
          echo "::error::Chord ONNX smoke check failed after retries (expected 200, last=${code:-empty})"
          exit 1

      - name: Write backend deployment summary
        if: always()
        run: |
          SUMMARY_FILE="$RUNNER_TEMP/backend-deploy-summary.md"
          {
            echo "## ECS Backend Deploy Result"
            echo ""
            echo "- Workflow result: \`${{ job.status }}\`"
            echo "- Python changed: \`${{ steps.filter-deploy.outputs.python_changed }}\`"
            echo "- Flyway changed: \`${{ steps.filter-deploy.outputs.flyway_changed }}\`"
            echo "- Chord ONNX changed: \`${{ steps.filter-deploy.outputs.chord_onnx_changed }}\`"
            echo "- Target ECS host: \`${ECS_HOST}\`"
            echo "- Target ECS path: \`${ECS_PATH}\`"
          } > "$SUMMARY_FILE"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend deployment summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy-summary
          path: ${{ runner.temp }}/backend-deploy-summary.md
          if-no-files-found: error
