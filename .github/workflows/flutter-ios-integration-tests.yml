name: Flutter iOS Integration Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ios-integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: CocoaPods
        run: pod install
        working-directory: flutter_app/ios

      - name: Boot iOS simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ {print $2; exit}')
          if [ -z "${SIMULATOR_ID:-}" ]; then
            SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 15/ {print $2; exit}')
          fi
          if [ -z "${SIMULATOR_ID:-}" ]; then
            echo "::error::No available iPhone simulator found on runner."
            exit 1
          fi
          xcrun simctl boot "$SIMULATOR_ID" || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "Booted simulator: $SIMULATOR_ID"

      - name: Check CI auth secret for integration tests
        env:
          E2E_CI_AUTH_SECRET: ${{ secrets.E2E_CI_AUTH_SECRET }}
        run: |
          if [ -z "${E2E_CI_AUTH_SECRET:-}" ]; then
            echo "::error::Missing secret E2E_CI_AUTH_SECRET for iOS integration tests."
            exit 1
          fi

      - name: Run Flutter integration tests on iOS simulator
        timeout-minutes: 20
        env:
          E2E_CI_AUTH_SECRET: ${{ secrets.E2E_CI_AUTH_SECRET }}
          E2E_SIMULATOR_ID: ${{ steps.simulator.outputs.id }}
          E2E_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p build
          python3 -u <<'PY'
          import os
          import shlex
          import signal
          import subprocess
          import sys
          import time
          from pathlib import Path

          max_idle_seconds = 480
          log_path = Path("build/integration-test.log")
          log_path.parent.mkdir(parents=True, exist_ok=True)

          command = [
              "flutter",
              "test",
              "integration_test",
              "-d",
              os.environ["E2E_SIMULATOR_ID"],
              "--reporter",
              "expanded",
              f"--dart-define=E2E_CI_AUTH_SECRET={os.environ['E2E_CI_AUTH_SECRET']}",
              f"--dart-define=E2E_CI_USER_KEY=github-actions-{os.environ['E2E_RUN_ID']}",
              "--dart-define=E2E_REQUIRE_CI_AUTH=true",
          ]

          print(f"Running command: {' '.join(shlex.quote(part) for part in command)}", flush=True)
          print(
              f"Watchdog enabled: fail if no stdout/stderr for {max_idle_seconds} seconds.",
              flush=True,
          )

          process = subprocess.Popen(
              command,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              bufsize=1,
              universal_newlines=True,
          )

          last_output_at = time.time()
          with log_path.open("w", encoding="utf-8") as log_file:
              while True:
                  line = process.stdout.readline() if process.stdout else ""
                  if line:
                      last_output_at = time.time()
                      sys.stdout.write(line)
                      log_file.write(line)
                      log_file.flush()
                      continue

                  if process.poll() is not None:
                      break

                  now = time.time()
                  if now - last_output_at > max_idle_seconds:
                      print(
                          f"::error::No test output for {max_idle_seconds}s, terminate flutter test.",
                          flush=True,
                      )
                      process.send_signal(signal.SIGTERM)
                      time.sleep(8)
                      if process.poll() is None:
                          process.kill()
                      raise SystemExit(124)

                  time.sleep(1)

          exit_code = process.wait()
          if exit_code != 0:
              raise SystemExit(exit_code)
          PY

      - name: Upload integration test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guitar-helper-integration-test-log
          path: flutter_app/build/integration-test.log
          if-no-files-found: warn
