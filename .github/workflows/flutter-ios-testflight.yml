# 云端构建 Flutter iOS IPA（App Store 导出）并上传到 App Store Connect（供 TestFlight / 审核）。
# 使用「手动签名」：需在仓库 GitHub Secrets 中配置分发证书、App Store 描述文件、以及 App Store Connect API 密钥。
#
# 与 flutter-ios-build.yml（ad-hoc 内测包）的区别：
# - 本工作流 export method 为 app-store，描述文件须为「App Store」类型（非 Ad Hoc）。
# - 证书须为 Apple Distribution（与 .p12 导出时一致）。
# - 上传使用 xcrun altool + App Store Connect API Key（Issuer ID、Key ID、.p8 私钥全文）。
#
name: Flutter iOS TestFlight

on:
  workflow_call:
    inputs:
      upload_to_testflight:
        description: "Whether to upload IPA to TestFlight"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Whether to upload IPA to TestFlight"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: flutter-ios-testflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve upload mode
        id: upload_mode
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "enabled=${{ github.event.inputs.upload_to_testflight }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=${{ inputs.upload_to_testflight }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate iOS build number increment
        id: build_number
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          pubspec = pathlib.Path("pubspec.yaml").read_text(encoding="utf-8")
          m = re.search(r"^version:\s*\d+\.\d+\.\d+\+(\d+)\s*$", pubspec, flags=re.M)
          if not m:
              print("::error::Cannot parse build number from flutter_app/pubspec.yaml")
              sys.exit(1)

          current = int(m.group(1))
          previous = None
          try:
              old_pubspec = subprocess.check_output(
                  ["git", "show", "HEAD~1:flutter_app/pubspec.yaml"],
                  stderr=subprocess.DEVNULL,
                  text=True,
              )
              pm = re.search(r"^version:\s*\d+\.\d+\.\d+\+(\d+)\s*$", old_pubspec, flags=re.M)
              if pm:
                  previous = int(pm.group(1))
          except Exception:
              previous = None

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"current={current}\n")
              f.write(f"previous={'' if previous is None else previous}\n")

          print(f"Detected iOS build number: {current}")
          if previous is None:
              print("No previous pubspec version found, skip monotonic check.")
              sys.exit(0)

          print(f"Previous iOS build number: {previous}")
          if os.environ.get("GH_EVENT_NAME") in {"push", "workflow_call"} and current <= previous:
              print(
                  "::error::pubspec build number must increase before TestFlight upload "
                  f"(current={current}, previous={previous})"
              )
              sys.exit(1)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: CocoaPods
        run: pod install
        working-directory: flutter_app/ios

      - name: Boot iOS simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ {print $2; exit}')
          if [ -z "${SIMULATOR_ID:-}" ]; then
            SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 15/ {print $2; exit}')
          fi
          if [ -z "${SIMULATOR_ID:-}" ]; then
            echo "::error::No available iPhone simulator found on runner."
            exit 1
          fi
          xcrun simctl boot "$SIMULATOR_ID" || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "Booted simulator: $SIMULATOR_ID"

      - name: Check CI auth secret for integration tests
        env:
          E2E_CI_AUTH_SECRET: ${{ secrets.E2E_CI_AUTH_SECRET }}
        run: |
          if [ -z "${E2E_CI_AUTH_SECRET:-}" ]; then
            echo "::error::Missing secret E2E_CI_AUTH_SECRET for iOS integration tests."
            exit 1
          fi

      - name: Run Flutter integration tests on iOS simulator
        env:
          E2E_CI_AUTH_SECRET: ${{ secrets.E2E_CI_AUTH_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p build
          flutter test integration_test -d "${{ steps.simulator.outputs.id }}" --reporter expanded \
            --dart-define=E2E_CI_AUTH_SECRET="${E2E_CI_AUTH_SECRET}" \
            --dart-define=E2E_CI_USER_KEY="github-actions-${{ github.run_id }}" \
            --dart-define=E2E_REQUIRE_CI_AUTH=true | tee build/integration-test.log

      - name: Upload integration test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guitar-helper-integration-test-log
          path: flutter_app/build/integration-test.log
          if-no-files-found: warn

      - name: Install signing certificate and provisioning profile
        if: steps.upload_mode.outputs.enabled == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          PROFILE_SPECIFIER: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          for var in BUILD_CERTIFICATE_BASE64 P12_PASSWORD BUILD_PROVISION_PROFILE_BASE64 KEYCHAIN_PASSWORD PROFILE_SPECIFIER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required env for signing (see IOS_DISTRIBUTION_* / IOS_APPSTORE_* / IOS_KEYCHAIN_PASSWORD in workflow comments)."
              exit 1
            fi
          done
          CERTIFICATE_PATH="$RUNNER_TEMP/dist_certificate.p12"
          PP_PATH="$RUNNER_TEMP/appstore_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          python3 -c "import base64, os, pathlib; pathlib.Path('$CERTIFICATE_PATH').write_bytes(base64.b64decode(os.environ['BUILD_CERTIFICATE_BASE64']))"
          python3 -c "import base64, os, pathlib; pathlib.Path('$PP_PATH').write_bytes(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"

      - name: Write ExportOptions.plist (App Store)
        if: steps.upload_mode.outputs.enabled == 'true'
        env:
          PROFILE_SPECIFIER: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > ios/ExportOptions-ci-appstore.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.wanghan.guitarhelper</key>
              <string>${PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build iOS artifacts without codesign
        if: steps.upload_mode.outputs.enabled == 'true'
        run: flutter build ios --release --no-codesign

      - name: Archive and export IPA with manual signing
        if: steps.upload_mode.outputs.enabled == 'true'
        env:
          PROFILE_SPECIFIER: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=7R8RS88G2M \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPECIFIER"

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions-ci-appstore.plist

      - name: Upload IPA artifact
        if: steps.upload_mode.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: guitar-helper-ios-appstore-ipa
          path: flutter_app/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Install App Store Connect API key for altool
        if: steps.upload_mode.outputs.enabled == 'true'
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          for var in KEY_ID PRIVATE_KEY ISSUER_ID; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_PRIVATE_KEY, or APP_STORE_CONNECT_ISSUER_ID (see workflow comments)."
              exit 1
            fi
          done
          mkdir -p ~/.private_keys
          KEY_FILE="$HOME/.private_keys/AuthKey_${KEY_ID}.p8"
          echo "$PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

      - name: Upload to App Store Connect (TestFlight)
        if: steps.upload_mode.outputs.enabled == 'true'
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        working-directory: flutter_app
        run: |
          set -euo pipefail
          IPA=$(find build/ios/ipa -name '*.ipa' -print -quit)
          if [ -z "${IPA:-}" ] || [ ! -f "$IPA" ]; then
            echo "::error::No .ipa found under build/ios/ipa"
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios -f "$IPA" --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Delete CI keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Write release summary
        if: always()
        run: |
          {
            echo "## iOS Release Result"
            echo ""
            echo "- Workflow result: \`${{ job.status }}\`"
            echo "- iOS build number: \`${{ steps.build_number.outputs.current }}\`"
            echo "- Previous build number: \`${{ steps.build_number.outputs.previous || 'N/A' }}\`"
            echo "- Integration tests: \`completed\`"
            echo "- TestFlight upload enabled: \`${{ steps.upload_mode.outputs.enabled }}\`"
            if [ "${{ steps.upload_mode.outputs.enabled }}" = "true" ]; then
              echo "- TestFlight upload: \`attempted\`"
            else
              echo "- TestFlight upload: \`skipped by input\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Optional mobile webhook notification
        if: always() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.MOBILE_NOTIFY_WEBHOOK_URL }}
        run: |
          payload=$(cat <<EOF
          {"text":"[guitar-ai-coach] iOS pipeline: ${{ job.status }} | build=${{ steps.build_number.outputs.current }} | upload=${{ steps.upload_mode.outputs.enabled }} | run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL" >/dev/null

# -----------------------------------------------------------------------------
# 需在仓库 Settings → Secrets and variables → Actions 中新增：
#
# 签名（须与「App Store」类型描述文件匹配，且 Bundle ID 为 com.wanghan.guitarhelper）
#
# IOS_DISTRIBUTION_CERTIFICATE_BASE64
#   Apple Distribution 证书导出的 .p12，经 base64 一整行（macOS: base64 -i cert.p12 | pbcopy）
#
# IOS_DISTRIBUTION_P12_PASSWORD
#   导出上述 .p12 时设置的密码
#
# IOS_APPSTORE_PROVISION_PROFILE_BASE64
#   「App Store」类型（非 Ad Hoc）的 .mobileprovision，base64
#
# IOS_APPSTORE_PROVISIONING_PROFILE_NAME
#   开发者网站中该描述文件的「名称」字段（与 UUID 不同）
#
# IOS_KEYCHAIN_PASSWORD
#   任意强随机字符串（仅用于 CI 临时钥匙串；可与 ad-hoc 工作流共用同名 Secret）
#
# App Store Connect API（上传构建；在 App Store Connect → 用户与访问 → 密钥 中创建）
#
# APP_STORE_CONNECT_ISSUER_ID
#   Issuer ID（密钥页面顶部可见）
#
# APP_STORE_CONNECT_KEY_ID
#   Key ID
#
# APP_STORE_CONNECT_PRIVATE_KEY
#   下载的 .p8 文件全文（含 BEGIN/END 行），原样粘贴到 Secret（多行）
#
# 集成测试登录（CI 专用）
#
# E2E_CI_AUTH_SECRET
#   供 integration_test 调用 /api/auth/ci-login 时使用的共享密钥；需与 ECS 上 CI_AUTH_SECRET 一致
#   同时确保 ECS backend.env 配置：CI_AUTH_ENABLED=true
#
# 注意：
# - 每次上传 TestFlight 前须在 pubspec.yaml 递增 build 号（version: x.y.z+build）。
# - 若未来 xcrun altool 被移除，可改用 Fastlane pilot 或 Transporter 命令行（iTMSTransporter）。
# -----------------------------------------------------------------------------
