name: Swift iOS TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "营销版本（CFBundleShortVersionString），例如 1.0.0"
        required: false
        default: "1.0.0"
      build_number:
        description: "Build 号（不填则自动用时间戳）"
        required: false
        default: ""
      app_bundle_id:
        description: "App Store Connect 里的 Bundle ID"
        required: false
        default: "com.wanghan.guitarhelper"

permissions:
  contents: read

concurrency:
  group: swift-ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload_testflight:
    name: Archive and upload to TestFlight
    runs-on: macos-latest
    env:
      PROJECT_PATH: swift_ios_host/SwiftEarHost.xcodeproj
      SCHEME: SwiftEarHost
      CONFIGURATION: Release
      TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
      PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISION_PROFILE_BASE64 }}
      PROFILE_NAME: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_NAME }}
      KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      MARKETING_VERSION_INPUT: ${{ github.event.inputs.marketing_version }}
      BUILD_NUMBER_INPUT: ${{ github.event.inputs.build_number }}
      APP_BUNDLE_ID_INPUT: ${{ github.event.inputs.app_bundle_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          for key in TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY P12_BASE64 P12_PASSWORD PROFILE_BASE64 PROFILE_NAME KEYCHAIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve build number
        id: build_meta
        run: |
          if [ -n "${BUILD_NUMBER_INPUT}" ]; then
            build_number="${BUILD_NUMBER_INPUT}"
          else
            build_number="$(date +%y%m%d%H%M)"
          fi
          marketing_version="${MARKETING_VERSION_INPUT:-1.0.0}"
          bundle_id="${APP_BUNDLE_ID_INPUT:-com.wanghan.guitarhelper}"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "marketing_version=${marketing_version}" >> "$GITHUB_OUTPUT"
          echo "bundle_id=${bundle_id}" >> "$GITHUB_OUTPUT"

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p "$HOME/.private_keys"
          printf "%s" "${ASC_PRIVATE_KEY}" > "$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Prepare signing assets
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import "$CERT_PATH" \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_NAME}.mobileprovision"

      - name: Archive app
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/SwiftEarHost.xcarchive"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ steps.build_meta.outputs.bundle_id }}" \
            MARKETING_VERSION="${{ steps.build_meta.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build_meta.outputs.build_number }}" \
            archive

      - name: Export IPA
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/SwiftEarHost.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ steps.build_meta.outputs.bundle_id }}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_PLIST"

          IPA_PATH="$(ls "$EXPORT_PATH"/*.ipa | awk 'NR==1{print}')"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            -f "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        if: always() && env.IPA_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: SwiftEarHost-ipa-${{ steps.build_meta.outputs.build_number }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: ignore

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Swift iOS TestFlight Upload"
            echo ""
            echo "- Bundle ID: \`${{ steps.build_meta.outputs.bundle_id }}\`"
            echo "- Marketing Version: \`${{ steps.build_meta.outputs.marketing_version }}\`"
            echo "- Build Number: \`${{ steps.build_meta.outputs.build_number }}\`"
            echo "- IPA Path: \`${IPA_PATH:-N/A}\`"
          } >> "$GITHUB_STEP_SUMMARY"
