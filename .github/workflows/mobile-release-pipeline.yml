name: Mobile release pipeline (ECS)

on:
  push:
    branches:
      - main
      - tiaoyinqi
    paths:
      - "backend/code/**"
      - "backend/database/flyway/sql/**"
      - "backend/database/flyway/flyway.conf"
      - ".github/workflows/mobile-release-pipeline.yml"
      - ".github/workflows/ecs-backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-release-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect_changes:
    name: Detect release scope
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/code/**'
              - 'backend/database/flyway/sql/**'
              - 'backend/database/flyway/flyway.conf'

  deploy_backend:
    name: Deploy backend to Aliyun ECS
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.backend == 'true'
    uses: ./.github/workflows/ecs-backend-deploy.yml
    secrets: inherit

  publish_summary:
    name: Publish pipeline summary
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy_backend
    if: always()
    steps:
      - name: Write pipeline summary
        run: |
          {
            echo "## Mobile Release Pipeline (backend)"
            echo ""
            echo "- Backend deploy result: \`${{ needs.deploy_backend.result }}\`"
            echo "- Backend changed in this push: \`${{ needs.detect_changes.outputs.backend }}\`"
            echo "- Workflow run: [open details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Optional mobile webhook notification
        if: secrets.MOBILE_NOTIFY_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.MOBILE_NOTIFY_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.deploy_backend.result }}" = "success" ]; then
            STATUS="success"
          elif [ "${{ needs.deploy_backend.result }}" = "skipped" ]; then
            STATUS="skipped"
          else
            STATUS="failed"
          fi
          payload=$(cat <<EOF
          {"text":"[guitar-ai-coach] backend deploy ${STATUS} | backend=${{ needs.deploy_backend.result }} | run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL" >/dev/null

      - name: Enforce gate result
        run: |
          backend_result="${{ needs.deploy_backend.result }}"
          backend_expected="${{ github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.backend == 'true' }}"

          if [ "$backend_expected" = "true" ] && [ "$backend_result" != "success" ]; then
            echo "::error::Backend deploy was expected but did not succeed."
            exit 1
          fi

          if [ "$backend_expected" = "false" ]; then
            echo "::notice::No backend release scope detected. Pipeline completed without deployment."
            exit 0
          fi

          if [ "$backend_result" = "failure" ]; then
            echo "::error::Pipeline gate failed. Check backend deploy job."
            exit 1
          fi
